# Render Blueprint — provisions the web service + a PostgreSQL database.
# Deploy with: Render Dashboard → New → Blueprint → point at this repo.
# https://render.com/docs/blueprint-spec

databases:
  - name: quantum-db
    databaseName: quantum
    user: quantum
    plan: free            # free Postgres (expires after 90 days; upgrade for production)

services:
  - type: web
    name: quantum-dev-team
    runtime: docker
    plan: free
    region: frankfurt      # closest Render region to the Middle East
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: "Quantum Dev Team"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      # REQUIRED for stable sessions. Generate once with
      #   php artisan key:generate --show
      # and paste the "base64:..." value in the Render dashboard.
      # If left unset, the container generates a temporary key on each deploy
      # so the app still boots, but users are logged out on every redeploy.
      - key: APP_KEY
        sync: false
      # Set to the service's public URL, e.g. https://quantum-dev-team.onrender.com
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      # --- Database (PostgreSQL) ---
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: quantum-db
          property: connectionString
      # --- Runtime services ---
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: public
      - key: MAIL_MAILER
        value: log
      # Persistent image storage (uploads survive redeploys). Set the full
      # cloudinary://API_KEY:API_SECRET@CLOUD_NAME URL in the dashboard.
      - key: CLOUDINARY_URL
        sync: false
      # Run migrations automatically on each deploy (set to false to disable).
      - key: RUN_MIGRATIONS
        value: "true"
      # Seed roles, settings, demo content and the super admin on deploy.
      # Idempotent, so it is safe to leave enabled for a demo environment.
      - key: RUN_SEED
        value: "true"
      # Super admin login for the seeded account. Set a private password here
      # (do NOT rely on the repo default) — re-seeding applies it.
      - key: ADMIN_EMAIL
        value: admin@quantum.test
      - key: ADMIN_PASSWORD
        sync: false
