; Production PHP settings for the Quantum Dev Team app.
; Loaded as /usr/local/etc/php/conf.d/zz-app.ini (overrides defaults).

memory_limit = 256M
max_execution_time = 60

; Upload limits — must be >= Nginx client_max_body_size for gallery uploads.
upload_max_filesize = 20M
post_max_size = 25M

expose_php = Off
date.timezone = UTC

; --- OPcache (production) -------------------------------------------------
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; Code never changes inside a running container, so skip timestamp checks
; for maximum performance. A new deploy = a new image = a fresh cache.
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
