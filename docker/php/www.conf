; PHP-FPM pool overrides — loaded as /usr/local/etc/php-fpm.d/zz-app.conf.

[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000

; CRITICAL for Render: by default PHP-FPM strips the environment, which would
; hide DATABASE_URL, APP_KEY, etc. from the application. Keep them.
clear_env = no

; Forward worker stdout/stderr to the container logs (captured by Render).
catch_workers_output = yes
decorate_workers_output = no

; Process manager sized for a small (≈512 MB) instance.
pm = dynamic
pm.max_children = 12
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500
